name: CI-CD AKS

on:
  push:
    branches:
      - main

env:
  ACR_NAME: acrredes2026
  ACR_LOGIN_SERVER: acrredes2026.azurecr.io
  IMAGE_NAME: redes-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Login en Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_ACR }}

      - name: Login en ACR
        run: az acr login --name $ACR_NAME

      - name: Construir imagen Docker
        run: |
          docker build -t $ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }} ./redes-parte2/app
          docker tag $ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }} \
                     $ACR_LOGIN_SERVER/$IMAGE_NAME:latest

      - name: Publicar imagen en ACR
        run: |
          docker push $ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }}
          docker push $ACR_LOGIN_SERVER/$IMAGE_NAME:latest

      - name: Confirmar imagen en ACR
        run: |
          az acr repository show-tags \
            --name $ACR_NAME \
            --repository $IMAGE_NAME \
            --output table

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Login en Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Conectar kubectl al AKS
        run: |
          az aks get-credentials \
            --resource-group rg-proyecto-redes \
            --name miAKS \
            --overwrite-existing

      - name: Actualizar tag de imagen
        run: |
          sed -i "s|IMAGE_TAG|${{ github.sha }}|g" redes-parte2/k8s/deployment.yaml

      - name: Aplicar manifiestos Kubernetes
        run: |
          kubectl apply -f redes-parte2/k8s/deployment.yaml
          kubectl apply -f redes-parte2/k8s/service.yaml

      - name: Esperar que el deploy termine
        run: |
          kubectl rollout status deployment/redes-app --timeout=120s

      - name: Verificar pods y servicio
        run: |
          kubectl get pods
          kubectl get services