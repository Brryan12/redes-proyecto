name: CI-CD AKS

on:
  push:
    branches:
      - main

env:
  ACR_NAME: acrredes2026
  ACR_LOGIN_SERVER: acrredes2026.azurecr.io
  IMAGE_NAME: redes-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Login en Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login en ACR
        run: az acr login --name $ACR_NAME

      - name: Construir imagen Docker
        run: |
          docker build -t $ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }} ./app
          docker tag $ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }} \
                     $ACR_LOGIN_SERVER/$IMAGE_NAME:latest

      - name: Publicar imagen en ACR
        run: |
          docker push $ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }}
          docker push $ACR_LOGIN_SERVER/$IMAGE_NAME:latest

      - name: Confirmar imagen en ACR
        run: |
          az acr repository show-tags \
            --name $ACR_NAME \
            --repository $IMAGE_NAME \
            --output table